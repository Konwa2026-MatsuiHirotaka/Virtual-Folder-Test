openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Folder organization management platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project management
  - name: nodes
    description: Node (file/folder) management
  - name: plans
    description: Move plan management
  - name: audit
    description: Audit log and restore operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project with an initial virtual folder tree
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Inspect a project — returns the full node tree
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Project with node tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/summary:
    get:
      operationId: getProjectSummary
      tags: [projects]
      summary: Get project dashboard summary — counts, structure stats
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/validate:
    get:
      operationId: validateProject
      tags: [projects]
      summary: Validate the current project structure for conflicts and integrity
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/nodes:
    get:
      operationId: listNodes
      tags: [nodes]
      summary: List all nodes in a project
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: List of nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Node"
    post:
      operationId: createNode
      tags: [nodes]
      summary: Add a new node to the project
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeInput"
      responses:
        "201":
          description: Created node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Node"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/nodes/{nodeId}:
    delete:
      operationId: deleteNode
      tags: [nodes]
      summary: Remove a node from the project
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/nodeId"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List move plans for a project
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovePlan"
    post:
      operationId: createPlan
      tags: [plans]
      summary: Create a dry-run move plan (no changes applied)
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanInput"
      responses:
        "201":
          description: Dry-run plan with projected changes and validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovePlan"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/plans/{planId}:
    get:
      operationId: getPlan
      tags: [plans]
      summary: Get a specific plan's details
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/planId"
      responses:
        "200":
          description: Plan detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovePlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/plans/{planId}/apply:
    post:
      operationId: applyPlan
      tags: [plans]
      summary: Apply a pending plan — executes the moves and creates an audit entry
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/planId"
      responses:
        "200":
          description: Applied plan with audit entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyResult"
        "400":
          description: Apply failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/audit:
    get:
      operationId: listAuditEntries
      tags: [audit]
      summary: List audit log entries for a project
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"

  /projects/{projectId}/restore/{changeId}:
    post:
      operationId: restoreChange
      tags: [audit]
      summary: Restore a project to the state before a specific change
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: changeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restore result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreResult"
        "400":
          description: Restore failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
    nodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
    planId:
      name: planId
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        rootPath:
          type: string
        nodeCount:
          type: integer
        fileCount:
          type: integer
        folderCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, rootPath, nodeCount, fileCount, folderCount, createdAt, updatedAt]

    ProjectInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        rootPath:
          type: string
          minLength: 1
        template:
          type: string
          enum: [empty, sample-web, sample-docs, sample-data]
          description: Seed the project with a sample folder structure
      required: [name, rootPath]

    ProjectDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        rootPath:
          type: string
        nodeCount:
          type: integer
        fileCount:
          type: integer
        folderCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/Node"
      required: [id, name, rootPath, nodeCount, fileCount, folderCount, createdAt, updatedAt, nodes]

    ProjectSummary:
      type: object
      properties:
        projectId:
          type: integer
        totalNodes:
          type: integer
        fileCount:
          type: integer
        folderCount:
          type: integer
        movableCount:
          type: integer
        maxDepth:
          type: integer
        pendingPlansCount:
          type: integer
        auditEntriesCount:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
      required: [projectId, totalNodes, fileCount, folderCount, movableCount, maxDepth, pendingPlansCount, auditEntriesCount, recentActivity]

    ValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        issues:
          type: array
          items:
            $ref: "#/components/schemas/ValidationIssue"
      required: [valid, issues]

    ValidationIssue:
      type: object
      properties:
        kind:
          type: string
          enum: [duplicate_path, orphan_node, root_escape, reserved_name, circular_ref]
        severity:
          type: string
          enum: [error, warning]
        message:
          type: string
        nodeId:
          type: ["string", "null"]
      required: [kind, severity, message]

    Node:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: integer
        kind:
          type: string
          enum: [file, folder]
        name:
          type: string
        logicalPath:
          type: string
        physicalPath:
          type: string
        movable:
          type: boolean
        parentId:
          type: ["string", "null"]
        depth:
          type: integer
        exportNames:
          type: array
          items:
            type: string
        createdAt:
          type: string
      required: [id, projectId, kind, name, logicalPath, physicalPath, movable, depth, exportNames, createdAt]

    NodeInput:
      type: object
      properties:
        id:
          type: string
          description: Optional custom ID; auto-generated if omitted
        kind:
          type: string
          enum: [file, folder]
        name:
          type: string
          minLength: 1
        logicalPath:
          type: string
          minLength: 1
        physicalPath:
          type: string
          minLength: 1
        movable:
          type: boolean
        parentId:
          type: string
        exportNames:
          type: array
          items:
            type: string
      required: [kind, name, logicalPath, physicalPath]

    MoveChange:
      type: object
      properties:
        nodeId:
          type: string
        nodeName:
          type: string
        kind:
          type: string
          enum: [file, folder]
        fromPath:
          type: string
        toPath:
          type: string
      required: [nodeId, nodeName, kind, fromPath, toPath]

    PlanInput:
      type: object
      properties:
        nodeId:
          type: string
          description: ID of the node to move
        targetPath:
          type: string
          description: Destination physical path
        description:
          type: string
      required: [nodeId, targetPath]

    MovePlan:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, applied, failed, rolled_back]
        nodeId:
          type: string
        targetPath:
          type: string
        changes:
          type: array
          items:
            $ref: "#/components/schemas/MoveChange"
        validationIssues:
          type: array
          items:
            $ref: "#/components/schemas/ValidationIssue"
        canApply:
          type: boolean
        createdAt:
          type: string
        appliedAt:
          type: ["string", "null"]
      required: [id, projectId, status, nodeId, targetPath, changes, validationIssues, canApply, createdAt]

    ApplyResult:
      type: object
      properties:
        plan:
          $ref: "#/components/schemas/MovePlan"
        auditEntry:
          $ref: "#/components/schemas/AuditEntry"
        nodesUpdated:
          type: integer
      required: [plan, auditEntry, nodesUpdated]

    AuditEntry:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        changeId:
          type: string
        operation:
          type: string
          enum: [move, restore, create, delete]
        planId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [success, failed, rolled_back]
        summary:
          type: string
        snapshotBefore:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        snapshotAfter:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        canRestore:
          type: boolean
        createdAt:
          type: string
      required: [id, projectId, changeId, operation, status, summary, snapshotBefore, snapshotAfter, canRestore, createdAt]

    RestoreResult:
      type: object
      properties:
        restoredNodes:
          type: integer
        auditEntry:
          $ref: "#/components/schemas/AuditEntry"
        message:
          type: string
      required: [restoredNodes, auditEntry, message]
